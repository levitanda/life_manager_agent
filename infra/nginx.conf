# nginx site config for dalev.click → FastAPI sidecar (life-agent-web.service)
# Install:
#   sudo cp infra/nginx.conf /etc/nginx/sites-available/dalev.click
#   sudo ln -s /etc/nginx/sites-available/dalev.click /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Then run certbot to convert HTTP → HTTPS:
#   sudo certbot --nginx -d dalev.click --non-interactive --agree-tos -m dalevitan17@gmail.com

server {
    listen 80;
    listen [::]:80;
    server_name dalev.click;

    # Health check (always reachable, even before TLS)
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
