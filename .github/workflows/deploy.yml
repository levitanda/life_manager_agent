name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            set -e
            cd ~/life-agent
            git pull origin main
            ~/life-agent/venv/bin/pip install --no-cache-dir -r requirements.txt -q
            sudo systemctl restart life-agent
            sudo systemctl is-active life-agent && echo "✅ Deployed successfully"
