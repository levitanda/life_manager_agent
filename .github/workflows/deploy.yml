name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            set -e
            cd ~/life-agent
            git pull origin main
            ~/life-agent/venv/bin/pip install --no-cache-dir -r requirements.txt -q
            sudo systemctl restart life-agent
            sudo systemctl restart life-agent-a2a 2>/dev/null || true
            sudo systemctl is-active life-agent && echo "✅ Deployed successfully"
